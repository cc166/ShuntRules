name: Sync iKeLee Clash core rules

on:
  workflow_dispatch:
  schedule:
    - cron: '11 2 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python -m pip install requests
      - run: python scripts/sync_ikelee_clash_core.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mirror/ClashCore docs/CLASH-CORE-MIRROR.md scripts/sync_ikelee_clash_core.py
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "sync: refresh iKeLee clash core rules"
          git push
