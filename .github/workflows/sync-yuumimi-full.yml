name: Sync yuumimi full categories

on:
  workflow_dispatch:
  schedule:
    - cron: '41 2 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Clone yuumimi rules
        run: git clone --depth=1 --branch release https://github.com/yuumimi/rules.git /tmp/yuumimi_rules
      - name: Build merged categories
        run: python scripts/sync_yuumimi_full.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom/Clash custom/Loon docs/YUUMIMI-FULL-SYNC.md scripts/sync_yuumimi_full.py
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "sync: refresh yuumimi full categories"
          git push
