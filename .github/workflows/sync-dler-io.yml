name: Sync dler-io Rules

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate existing files
        run: python3 sync_dler_io.py --check-existing

      - name: Sync dler-io/Rules
        run: python3 sync_dler_io.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add surge/ _sync_report_dler_io.json sync_lib.py sync_dler_io.py
          if git diff --cached --quiet; then
            echo "No changes from dler-io/Rules"
            exit 0
          fi
          git commit -m "sync: update dler-io rules"
          git push
