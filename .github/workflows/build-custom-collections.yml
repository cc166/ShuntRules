name: Build custom collections

on:
  workflow_dispatch:
  schedule:
    - cron: '33 3 * * 0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python scripts/build_collections.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom/Loon custom/Clash
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "build: refresh custom collections"
          git push
